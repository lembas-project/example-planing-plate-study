[project]
name = "planing-plate-froude-sweep"
type = "study"
description = "Parametric study of planing flat plate across Froude numbers and angles of attack"
tags = ["hydrodynamics", "planing", "planingfsi"]
channels = ["conda-forge", "lembas-project"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11"
numpy = "*"
pandas = "*"
matplotlib = "*"
lembas = ">=0.2.1"
planingfsi = "*"

[plugins]
# lembas-planingfsi = ">=0.1.0"

[local-plugins]
plugin = "plugin.py"

[tasks.report]
cmd = "jupyter nbconvert --execute report.ipynb --to html"
depends-on = ["run"]
description = "Generate HTML report from analysis notebook"

[study]
cases = "cases.yaml"
