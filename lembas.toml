[project]
name = "planing-plate-froude-sweep"
type = "study"
description = "Parametric study of planing flat plate across Froude numbers and angles of attack"
tags = ["hydrodynamics", "planing", "planingfsi"]
channels = ["conda-forge", "lembas-project"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11"
numpy = "*"
pandas = "*"
matplotlib = "*"
jinja2 = "*"
planingfsi = "*"

[pypi-dependencies]
lembas = {path = "../../lembas-core", editable = true}

[plugins]
# lembas-planingfsi = ">=0.1.0"

[local-plugins]
plugin = "plugin.py"

[study]
cases = "cases.yaml"

[[platform]]
name = "production"
url = "https://lembas.fly.dev"

[[platform]]
name = "local"
url = "http://localhost:8001"
